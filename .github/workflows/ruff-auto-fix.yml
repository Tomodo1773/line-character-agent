name: Ruff Auto Fix and Comment

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint-and-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Set up Python version
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.5.13"

      - name: Setup Socket Firewall
        uses: socketdev/action@937f824ec476dfd164d4a4d9995751427b0be143 # v1
        with:
          mode: firewall

      - name: Install dependencies for api
        run: |
          cd src/api
          sfw uv sync

      - name: Install dependencies for func
        run: |
          cd src/func
          sfw uv sync

      - name: Run Ruff check with fix
        run: |
          (cd src/api && uv run ruff check --fix .)
          (cd src/func && uv run ruff check --fix .)

      - name: Run Ruff format
        run: |
          (cd src/api && uv run ruff format .)
          (cd src/func && uv run ruff format .)

      - name: Commit fixed files
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "style: apply ruff auto-fix"
          skip_ci: true
