name: Test FUNC

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - "src/func/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python version
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "0.5.13"

      - name: Install dependencies
        run: |
          cd src/func
          uv sync

      - name: Run Ruff check
        run: |
          cd src/func
          uv run ruff check .

      - name: Run Ruff format check
        run: |
          cd src/func
          uv run ruff format --check .

      - name: Run tests
        env:
          SPAN_DAYS: "1"
        run: |
          cd src/func
          uv run pytest -s
